<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-time Translation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <style>
      body.dark-mode {
        background-color: #1a202c;
        color: #d2d6dc;
      }

      body.dark-mode .bg-white {
        background-color: #2d3748;
      }

      body.dark-mode .text-gray-600 {
        color: #cbd5e0;
      }

      body.dark-mode .border {
        border-color: #4a5568;
      }

      body.dark-mode .hover\:bg-blue-600:hover {
        background-color: #4299e1;
      }

      body.dark-mode .hover\:bg-red-600:hover {
        background-color: #e53e3e;
      }

      body.dark-mode .text-blue-500 {
        color: #90cdf4;
      }

      body.dark-mode .text-gray-700 {
        color: #cbd5e0;
      }

      body.dark-mode .text-gray-800 {
        color: #cbd5e0;
      }

      body.dark-mode select {
        background-color: #2d3748;
        color: #cbd5e0;
      }

      body.dark-mode option {
        background-color: #2d3748;
        color: #cbd5e0;
      }

      body.dark-mode .btn-dark-mode {
        background-color: #4a5568;
        color: #d2d6dc;
      }

      body.dark-mode .btn-dark-mode:hover {
        background-color: #2d3748;
      }
    </style>
  </head>
  <body
    class="bg-gray-100 text-gray-800 font-sans flex items-center justify-center h-screen"
  >
    <div class="p-8 bg-white rounded-md shadow-lg w-full max-w-md">
      <h1 class="text-3xl font-semibold mb-6">Real-time Translation</h1>

      <form id="translationForm">
        <div class="mb-4">
          <label
            for="sourceLanguage"
            class="block text-sm font-medium text-gray-600"
            >Source Language:</label
          >
          <select
            id="sourceLanguage"
            class="mt-1 p-2 w-full border rounded-md"
            required
          >
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
            <option value="ml">Malayalam</option>
            <option value="bn">Bengali</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
            <option value="ja">Japanese</option>
            <option value="zh-cn">Chinese</option>
            <option value="fr">French</option>
            <option value="it">Italian</option>
            <option value="ar">Arabic</option>
          </select>
        </div>

        <div class="mb-4">
          <label
            for="targetLanguage"
            class="block text-sm font-medium text-gray-600"
            >Target Language:</label
          >
          <select
            id="targetLanguage"
            class="mt-1 p-2 w-full border rounded-md"
            required
          >
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
            <option value="ml">Malayalam</option>
            <option value="bn">Bengali</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
            <option value="ja">Japanese</option>
            <option value="zh-cn">Chinese</option>
            <option value="fr">French</option>
            <option value="it">Italian</option>
            <option value="ar">Arabic</option>
          </select>
        </div>

        <p id="originalText" class="mb-2 text-gray-600">Original:</p>
        <p id="translatedText" class="mb-6 text-gray-800">Translation:</p>

        <div class="flex">
          <button
            type="button"
            onclick="startTranslation()"
            class="flex-shrink-0 bg-blue-500 text-white px-4 py-2 rounded-md mr-2 hover:bg-blue-600"
          >
            Start Translation
          </button>
          <button
            type="button"
            onclick="stopTranslation()"
            class="flex-shrink-0 bg-red-500 text-white px-4 py-2 rounded-md hover:bg-red-600"
          >
            Stop Translation
          </button>
        </div>
      </form>

      <div id="output" class="mt-8">
        <h3 class="text-xl font-semibold text-gray-700 mb-4">Translation:</h3>
        <div id="transcription" class="text-gray-800"></div>
        <div id="translation" class="text-blue-500"></div>
      </div>
    </div>

    <script>
      function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
      }
    </script>
    <script src="/static/script.js"></script>
    <button
      onclick="toggleDarkMode()"
      class="fixed top-4 right-4 px-2 py-1 bg-gray-800 text-white rounded-full"
    >
      Light/Dark
    </button>
  </body>
</html>
